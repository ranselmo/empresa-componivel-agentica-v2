global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: [alertname, shard, pbc]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: critical
      repeat_interval: 1h

receivers:
  - name: default
    webhook_configs:
      - url: "${ALERT_WEBHOOK_URL}"
        send_resolved: true
        http_config:
          follow_redirects: true
  - name: critical
    webhook_configs:
      - url: "${ALERT_WEBHOOK_URL}"
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: [alertname, shard, pbc]
