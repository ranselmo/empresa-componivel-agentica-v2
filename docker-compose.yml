name: poc-eci

networks:
  poc-eci:
    driver: bridge

volumes:
  grafana-data:
  prometheus-data:

# ── Infraestrutura base ────────────────────────────────────────────────────────
services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    networks: [poc-eci]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    networks: [poc-eci]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:29092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    networks: [poc-eci]
    depends_on: [kafka]
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: poc-eci
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  debezium:
    image: debezium/connect:2.5
    networks: [poc-eci]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: debezium-connect
      CONFIG_STORAGE_TOPIC: debezium.configs
      OFFSET_STORAGE_TOPIC: debezium.offsets
      STATUS_STORAGE_TOPIC: debezium.status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1

  prometheus:
    image: prom/prometheus:v2.48.0
    networks: [poc-eci]
    ports:
      - "9095:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus

  grafana:
    image: grafana/grafana:10.2.0
    networks: [poc-eci]
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./infra/monitoring/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: poc123
      GF_SECURITY_ADMIN_USER: admin

  jaeger:
    image: jaegertracing/all-in-one:1.52
    networks: [poc-eci]
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  alertmanager:
    image: prom/alertmanager:v0.26.0
    networks: [poc-eci]
    ports:
      - "9093:9093"

  db-saga:
    image: postgres:16-alpine
    networks: [poc-eci]
    ports:
      - "5430:5432"
    environment:
      POSTGRES_DB: saga
      POSTGRES_USER: saga
      POSTGRES_PASSWORD: saga123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saga -d saga"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── shard-router ────────────────────────────────────────────────────────────

  shard-router:
    build: ./shard-router
    networks: [poc-eci]
    ports:
      - "8080:8080"
    depends_on: [kafka]
    environment:
      PORT: "8080"
      SAGA_HUB_URL: http://saga-hub:9090
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      SHARD1_PEDIDOS_ACTIVE_URL: http://cell-pedidos-s1-active:8000
      SHARD1_PEDIDOS_PASSIVE_URL: http://cell-pedidos-s1-passive:8000
      SHARD1_ESTOQUE_ACTIVE_URL: http://cell-estoque-s1-active:8000
      SHARD1_ESTOQUE_PASSIVE_URL: http://cell-estoque-s1-passive:8000
      SHARD1_NOTIFICACOES_ACTIVE_URL: http://cell-notif-s1-active:8000
      SHARD1_NOTIFICACOES_PASSIVE_URL: http://cell-notif-s1-passive:8000
      SHARD2_PEDIDOS_ACTIVE_URL: http://cell-pedidos-s2-active:8000
      SHARD2_PEDIDOS_PASSIVE_URL: http://cell-pedidos-s2-passive:8000
      SHARD2_ESTOQUE_ACTIVE_URL: http://cell-estoque-s2-active:8000
      SHARD2_ESTOQUE_PASSIVE_URL: http://cell-estoque-s2-passive:8000
      SHARD2_NOTIFICACOES_ACTIVE_URL: http://cell-notif-s2-active:8000
      SHARD2_NOTIFICACOES_PASSIVE_URL: http://cell-notif-s2-passive:8000
      SHARD3_PEDIDOS_ACTIVE_URL: http://cell-pedidos-s3-active:8000
      SHARD3_PEDIDOS_PASSIVE_URL: http://cell-pedidos-s3-passive:8000
      SHARD3_ESTOQUE_ACTIVE_URL: http://cell-estoque-s3-active:8000
      SHARD3_ESTOQUE_PASSIVE_URL: http://cell-estoque-s3-passive:8000
      SHARD3_NOTIFICACOES_ACTIVE_URL: http://cell-notif-s3-active:8000
      SHARD3_NOTIFICACOES_PASSIVE_URL: http://cell-notif-s3-passive:8000

  # ── saga-hub ────────────────────────────────────────────────────────────────

  saga-hub:
    build: ./saga-hub
    networks: [poc-eci]
    depends_on:
      kafka:
        condition: service_healthy
      db-saga:
        condition: service_healthy
    environment:
      PORT: "9090"
      DATABASE_URL: postgres://saga:saga123@db-saga:5432/saga?sslmode=disable
      KAFKA_BROKERS: kafka:29092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317

  # ── data-sync ───────────────────────────────────────────────────────────────

  data-sync:
    build: ./data-sync
    networks: [poc-eci]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:29092
      PASSIVE_DSN_SHARD1_PEDIDOS: postgres://pedidos:pedidos123@db-pedidos-s1-passive:5432/pedidos?sslmode=disable
      PASSIVE_DSN_SHARD2_PEDIDOS: postgres://pedidos:pedidos123@db-pedidos-s2-passive:5432/pedidos?sslmode=disable
      PASSIVE_DSN_SHARD3_PEDIDOS: postgres://pedidos:pedidos123@db-pedidos-s3-passive:5432/pedidos?sslmode=disable
      PASSIVE_DSN_SHARD1_ESTOQUE: postgres://estoque:estoque123@db-estoque-s1-passive:5432/estoque?sslmode=disable
      PASSIVE_DSN_SHARD2_ESTOQUE: postgres://estoque:estoque123@db-estoque-s2-passive:5432/estoque?sslmode=disable
      PASSIVE_DSN_SHARD3_ESTOQUE: postgres://estoque:estoque123@db-estoque-s3-passive:5432/estoque?sslmode=disable
      PASSIVE_DSN_SHARD1_NOTIFICACOES: postgres://notificacoes:notif123@db-notif-s1-passive:5432/notificacoes?sslmode=disable
      PASSIVE_DSN_SHARD2_NOTIFICACOES: postgres://notificacoes:notif123@db-notif-s2-passive:5432/notificacoes?sslmode=disable
      PASSIVE_DSN_SHARD3_NOTIFICACOES: postgres://notificacoes:notif123@db-notif-s3-passive:5432/notificacoes?sslmode=disable

  # ── Redis por shard × PBC ativo (9 instâncias) ───────────────────────────────

  redis-pedidos-s1: { image: redis:7.2-alpine, networks: [poc-eci] }
  redis-estoque-s1: { image: redis:7.2-alpine, networks: [poc-eci] }
  redis-notif-s1:   { image: redis:7.2-alpine, networks: [poc-eci] }
  redis-pedidos-s2: { image: redis:7.2-alpine, networks: [poc-eci] }
  redis-estoque-s2: { image: redis:7.2-alpine, networks: [poc-eci] }
  redis-notif-s2:   { image: redis:7.2-alpine, networks: [poc-eci] }
  redis-pedidos-s3: { image: redis:7.2-alpine, networks: [poc-eci] }
