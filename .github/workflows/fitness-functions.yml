name: Fitness Functions

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  boundary-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check PBC isolation (L1)
        run: |
          for pbc in cell-pedidos cell-estoque cell-notificacoes; do
            others=""
            for other in cell-pedidos cell-estoque cell-notificacoes; do
              [ "$pbc" = "$other" ] && continue
              others="$others $other"
            done
            for other in $others; do
              if grep -r "ranselmo/poc-eci/$other" $pbc/; then
                echo "FAIL: $pbc imports $other (L1 violation)"
                exit 1
              fi
            done
          done
          echo "PASS: all PBC boundaries respected"

  sast:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cell:
          - shard-router
          - saga-hub
          - data-sync
          - cell-pedidos
          - cell-estoque
          - cell-notificacoes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.cell }}-${{ hashFiles(format('{0}/go.sum', matrix.cell)) }}
          restore-keys: ${{ runner.os }}-go-${{ matrix.cell }}-
      - name: govulncheck
        run: cd ${{ matrix.cell }} && go install golang.org/x/vuln/cmd/govulncheck@v1.1.3 && govulncheck ./...
      - name: gosec
        run: cd ${{ matrix.cell }} && go install github.com/securego/gosec/v2/cmd/gosec@v2.21.4 && gosec -severity medium ./...

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cell:
          - shard-router
          - saga-hub
          - data-sync
          - cell-pedidos
          - cell-estoque
          - cell-notificacoes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.cell }}-${{ hashFiles(format('{0}/go.sum', matrix.cell)) }}
          restore-keys: ${{ runner.os }}-go-${{ matrix.cell }}-
      - name: build
        run: cd ${{ matrix.cell }} && go build ./...

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cell:
          - shard-router
          - saga-hub
          - data-sync
          - cell-pedidos
          - cell-estoque
          - cell-notificacoes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.cell }}-${{ hashFiles(format('{0}/go.sum', matrix.cell)) }}
          restore-keys: ${{ runner.os }}-go-${{ matrix.cell }}-
      - name: test
        run: cd ${{ matrix.cell }} && go test -race -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cell:
          - shard-router
          - saga-hub
          - data-sync
          - cell-pedidos
          - cell-estoque
          - cell-notificacoes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.cell }}-${{ hashFiles(format('{0}/go.sum', matrix.cell)) }}
          restore-keys: ${{ runner.os }}-go-${{ matrix.cell }}-
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59.1
          working-directory: ${{ matrix.cell }}
