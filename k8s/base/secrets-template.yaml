apiVersion: v1
kind: Secret
metadata:
  name: cell-pedidos-s1-active
  namespace: poc-eci
type: Opaque
stringData:
  database-url: "postgres://pedidos:<SENHA>@db-pedidos-s1-active:5432/pedidos?sslmode=require"
  redis-url: "redis://redis-pedidos-s1:6379"
---
