apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cell-notif-s2-active
  namespace: poc-eci
spec:
  scaleTargetRef:
    { apiVersion: apps/v1, kind: Deployment, name: cell-notif-s2-active }
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
