apiVersion: apps/v1
kind: Deployment
metadata:
  name: cell-pedidos-s1-passive
  namespace: poc-eci
  labels: { app: cell-pedidos, shard: shard-1, role: passive, pbc: pedidos }
spec:
  replicas: 1
  selector:
    matchLabels: { app: cell-pedidos, shard: shard-1, role: passive }
  template:
    metadata:
      labels: { app: cell-pedidos, shard: shard-1, role: passive, pbc: pedidos }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: cell-pedidos
                  shard: shard-1
                  role: active
              topologyKey: kubernetes.io/hostname
      containers:
        - name: cell-pedidos
          image: poc-eci/cell-pedidos:latest
          ports: [{ containerPort: 8000 }]
          env:
            - { name: SHARD_ID, value: shard-1 }
            - { name: CELL_ROLE, value: passive }
            - { name: KAFKA_BROKERS, value: kafka:29092 }
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: cell-pedidos-s1-passive, key: database-url }
            - name: REDIS_URL
              valueFrom:
                secretKeyRef: { name: redis-pedidos-s1, key: url }
          resources:
            requests: { cpu: 100m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          livenessProbe:
            httpGet: { path: /healthz/live, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /healthz/ready, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cell-pedidos-s1-passive
  namespace: poc-eci
spec:
  selector: { app: cell-pedidos, shard: shard-1, role: passive }
  ports: [{ port: 8000, targetPort: 8000 }]
  type: ClusterIP
