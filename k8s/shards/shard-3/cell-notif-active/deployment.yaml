apiVersion: apps/v1
kind: Deployment
metadata:
  name: cell-notif-s3-active
  namespace: poc-eci
  labels: { app: cell-notif, shard: shard-3, role: active, pbc: notif }
spec:
  replicas: 1
  selector:
    matchLabels: { app: cell-notif, shard: shard-3, role: active }
  template:
    metadata:
      labels: { app: cell-notif, shard: shard-3, role: active, pbc: notif }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: cell-notif
                  shard: shard-3
                  role: passive
              topologyKey: kubernetes.io/hostname
      containers:
        - name: cell-notif
          image: poc-eci/cell-notif:latest
          ports: [{ containerPort: 8000 }]
          env:
            - { name: SHARD_ID, value: shard-3 }
            - { name: CELL_ROLE, value: active }
            - { name: KAFKA_BROKERS, value: kafka:29092 }
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: cell-notif-s3-active, key: database-url }
            - name: REDIS_URL
              valueFrom:
                secretKeyRef: { name: redis-notif-s3, key: url }
          resources:
            requests: { cpu: 100m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          livenessProbe:
            httpGet: { path: /healthz/live, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /healthz/ready, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cell-notif-s3-active
  namespace: poc-eci
spec:
  selector: { app: cell-notif, shard: shard-3, role: active }
  ports: [{ port: 8000, targetPort: 8000 }]
  type: ClusterIP
