apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-sync
  namespace: poc-eci
  labels: { app: data-sync }
spec:
  replicas: 1
  selector:
    matchLabels: { app: data-sync }
  template:
    metadata:
      labels: { app: data-sync }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9191"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: data-sync
          image: poc-eci/data-sync:latest
          ports: [{ containerPort: 9191 }]
          env:
            - { name: KAFKA_BROKERS, value: "kafka:29092" }
            - name: PASSIVE_DSN_SHARD1_PEDIDOS
              valueFrom:
                secretKeyRef: { name: data-sync-passive-dsns, key: shard1-pedidos }
            - name: PASSIVE_DSN_SHARD2_PEDIDOS
              valueFrom:
                secretKeyRef: { name: data-sync-passive-dsns, key: shard2-pedidos }
            - name: PASSIVE_DSN_SHARD3_PEDIDOS
              valueFrom:
                secretKeyRef: { name: data-sync-passive-dsns, key: shard3-pedidos }
            - name: PASSIVE_DSN_SHARD1_ESTOQUE
              valueFrom:
                secretKeyRef: { name: data-sync-passive-dsns, key: shard1-estoque }
            - name: PASSIVE_DSN_SHARD2_ESTOQUE
              valueFrom:
                secretKeyRef: { name: data-sync-passive-dsns, key: shard2-estoque }
            - name: PASSIVE_DSN_SHARD3_ESTOQUE
              valueFrom:
                secretKeyRef: { name: data-sync-passive-dsns, key: shard3-estoque }
            - name: PASSIVE_DSN_SHARD1_NOTIFICACOES
              valueFrom:
                secretKeyRef: { name: data-sync-passive-dsns, key: shard1-notificacoes }
            - name: PASSIVE_DSN_SHARD2_NOTIFICACOES
              valueFrom:
                secretKeyRef: { name: data-sync-passive-dsns, key: shard2-notificacoes }
            - name: PASSIVE_DSN_SHARD3_NOTIFICACOES
              valueFrom:
                secretKeyRef: { name: data-sync-passive-dsns, key: shard3-notificacoes }
          resources:
            requests: { cpu: 100m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          livenessProbe:
            httpGet: { path: /healthz/live, port: 9191 }
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /healthz/ready, port: 9191 }
            initialDelaySeconds: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: data-sync
  namespace: poc-eci
spec:
  selector: { app: data-sync }
  ports: [{ port: 9191, targetPort: 9191 }]
  type: ClusterIP
