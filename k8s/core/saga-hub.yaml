apiVersion: apps/v1
kind: Deployment
metadata:
  name: saga-hub
  namespace: poc-eci
  labels: { app: saga-hub }
spec:
  replicas: 2
  selector:
    matchLabels: { app: saga-hub }
  template:
    metadata:
      labels: { app: saga-hub }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: saga-hub
          image: poc-eci/saga-hub:latest
          ports: [{ containerPort: 9090 }]
          env:
            - { name: PORT, value: "9090" }
            - { name: KAFKA_BROKERS, value: "kafka:29092" }
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: saga-hub, key: database-url }
          resources:
            requests: { cpu: 200m, memory: 128Mi }
            limits: { cpu: 1000m, memory: 512Mi }
          livenessProbe:
            httpGet: { path: /healthz/live, port: 9090 }
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /healthz/ready, port: 9090 }
            initialDelaySeconds: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: saga-hub
  namespace: poc-eci
spec:
  selector: { app: saga-hub }
  ports: [{ port: 9090, targetPort: 9090 }]
  type: ClusterIP
