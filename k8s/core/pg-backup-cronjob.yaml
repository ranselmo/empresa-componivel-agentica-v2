apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-pvc
  namespace: poc-eci
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pg-backup-scripts
  namespace: poc-eci
data:
  pg-backup.sh: |
    #!/bin/sh
    # Full script content is in infra/backup/pg-backup.sh
    # Mount from the ConfigMap with the actual script in production.
    TIMESTAMP=$(date +%Y%m%d_%H%M%S)
    BACKUP_DIR=${BACKUP_DIR:-/backups}
    RETAIN_DAYS=${RETAIN_DAYS:-7}
    mkdir -p "$BACKUP_DIR"
    for shard in s1 s2 s3; do
      for pbc in pedidos estoque notificacoes; do
        label="${pbc}-${shard}-active"
        dsn_var="$(echo "${pbc}_DSN_${shard}" | tr 'a-z' 'A-Z')"
        eval "dsn=\${${dsn_var}:-}"
        [ -n "$dsn" ] && pg_dump "$dsn" | gzip > "$BACKUP_DIR/${label}_${TIMESTAMP}.sql.gz"
      done
    done
    [ -n "${SAGA_DSN:-}" ] && pg_dump "$SAGA_DSN" | gzip > "$BACKUP_DIR/saga_${TIMESTAMP}.sql.gz"
    find "$BACKUP_DIR" -name "*.sql.gz" -mtime +"$RETAIN_DAYS" -delete
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pg-backup
  namespace: poc-eci
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-backup
              image: postgres:16-alpine
              command: ["/bin/sh", "/scripts/pg-backup.sh"]
              envFrom:
                - secretRef:
                    name: pg-backup-credentials
              env:
                - name: BACKUP_DIR
                  value: /backups
                - name: RETAIN_DAYS
                  value: "7"
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: backup-storage
                  mountPath: /backups
          volumes:
            - name: scripts
              configMap:
                name: pg-backup-scripts
                defaultMode: 0755
            - name: backup-storage
              persistentVolumeClaim:
                claimName: backup-pvc
