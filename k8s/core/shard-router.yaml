apiVersion: apps/v1
kind: Deployment
metadata:
  name: shard-router
  namespace: poc-eci
  labels: { app: shard-router }
spec:
  replicas: 2
  selector:
    matchLabels: { app: shard-router }
  template:
    metadata:
      labels: { app: shard-router }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: shard-router
          image: poc-eci/shard-router:latest
          ports: [{ containerPort: 8080 }]
          env:
            - { name: PORT, value: "8080" }
            - { name: KAFKA_BROKERS, value: "kafka:29092" }
          resources:
            requests: { cpu: 100m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          livenessProbe:
            httpGet: { path: /healthz/live, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /healthz/ready, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: shard-router
  namespace: poc-eci
spec:
  selector: { app: shard-router }
  ports: [{ port: 8080, targetPort: 8080 }]
  type: ClusterIP
